<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oráculo Astral — Tu guía diaria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --noche:#070510; --noche-2:#100b22; --noche-3:#1a1233;
    --oro:#d4af6a; --oro-claro:#f0dca8; --oro-fuerte:#c9a96a;
    --luna:#a99bd4;
    --marfil:#f5efe2; --texto:#b9b3cc; --texto-suave:#7e7796;
    --linea:rgba(212,175,106,.25);
    --serif:"Fraunces",Georgia,serif;
    --sans:"Inter",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--noche);color:var(--texto);font-family:var(--sans);
    line-height:1.65;min-height:100vh;font-size:15.5px;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.45),transparent 50%),
      radial-gradient(1px 1px at 78% 8%,rgba(255,255,255,.35),transparent 50%),
      radial-gradient(1.5px 1.5px at 55% 32%,rgba(232,211,163,.45),transparent 50%),
      radial-gradient(1px 1px at 30% 60%,rgba(255,255,255,.25),transparent 50%),
      radial-gradient(1px 1px at 88% 45%,rgba(169,155,212,.4),transparent 50%),
      radial-gradient(ellipse 90% 45% at 50% -10%,#1e1640 0%,transparent 70%),
      var(--noche);
  }
  h1,h2,h3{font-family:var(--serif);color:var(--marfil);font-weight:600;letter-spacing:-.01em}
  .oculto{display:none !important}
  .wrap{max-width:600px;margin:0 auto;padding:2.2rem 1.3rem 4rem}
  .centro{text-align:center}
  .eyebrow{
    font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;
    color:var(--oro);font-weight:600;
  }

  header.top{
    display:flex;align-items:center;justify-content:space-between;
    max-width:600px;margin:0 auto;padding:1.4rem 1.3rem 0;
  }
  .logo{font-family:var(--serif);font-size:1.25rem;color:var(--marfil);font-weight:600}
  .logo span{font-style:italic;background:linear-gradient(105deg,#8c6d2f,#f0dca8 50%,#8c6d2f);-webkit-background-clip:text;background-clip:text;color:transparent}
  .link-sutil{
    background:none;border:none;color:var(--texto-suave);font-size:.78rem;
    cursor:pointer;font-family:var(--sans);text-decoration:underline;text-underline-offset:3px;
  }
  .link-sutil:hover{color:var(--oro-claro)}

  input,textarea{
    width:100%;background:var(--noche-2);border:1px solid var(--linea);
    color:var(--marfil);padding:.85rem 1rem;border-radius:4px;font-size:.92rem;
    font-family:var(--sans);margin-bottom:1rem;
  }
  input:focus,textarea:focus{outline:none;border-color:var(--oro)}
  label{
    display:block;font-size:.72rem;color:var(--texto-suave);margin-bottom:.4rem;
    text-transform:uppercase;letter-spacing:.08em;
  }
  .btn{
    display:inline-block;width:100%;text-align:center;text-decoration:none;
    font-size:.85rem;font-weight:600;padding:.9rem 1.4rem;border-radius:4px;
    cursor:pointer;letter-spacing:.04em;text-transform:uppercase;
    transition:opacity .15s;font-family:var(--sans);
  }
  .btn:hover{opacity:.88}
  .btn-oro{background:var(--oro);color:#1a1428;border:1px solid var(--oro)}
  .btn-ghost{background:transparent;border:1px solid var(--linea);color:var(--oro-claro)}

  .card{
    border:1px solid var(--linea);border-radius:6px;padding:1.5rem;
    background:linear-gradient(170deg,var(--noche-2),rgba(20,16,36,.5));margin-bottom:1.1rem;
  }
  .card p{color:var(--texto);font-size:.95rem;white-space:pre-line}
  .fila{display:flex;gap:.55rem;flex-wrap:wrap}
  .chip{
    border:1px solid var(--linea);border-radius:2px;padding:.35rem .8rem;
    font-size:.72rem;color:var(--oro-claro);background:var(--noche-2);letter-spacing:.02em;
  }

  nav.tabs{
    display:flex;gap:0;overflow-x:auto;padding:.8rem 0 1.5rem;position:sticky;top:0;
    background:var(--noche);z-index:10;border-bottom:1px solid var(--linea);
  }
  nav.tabs button{
    background:transparent;border:none;color:var(--texto-suave);
    padding:.5rem 1rem .8rem;font-size:.78rem;cursor:pointer;white-space:nowrap;
    text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid transparent;
    font-family:var(--sans);margin-bottom:-1px;
  }
  nav.tabs button.activo{color:var(--oro-claro);border-bottom-color:var(--oro)}

  .estado-msg{font-size:.85rem;color:var(--texto-suave);text-align:center;padding:1.2rem 0}
  .error-msg{
    font-size:.85rem;color:#d99a89;text-align:center;padding:.9rem;
    background:rgba(216,90,48,.1);border-radius:4px;margin-bottom:1rem;border:1px solid rgba(216,90,48,.25);
  }

  .premium-banner{
    border:1px solid var(--oro);border-radius:6px;padding:1.6rem 1.2rem;text-align:center;
    background:linear-gradient(170deg,var(--noche-3),var(--noche-2));margin-bottom:1.2rem;
  }
  .premium-banner .precio{font-family:var(--serif);color:var(--oro-claro);font-size:1.9rem;margin:.4rem 0;font-weight:700}

  audio{width:100%;margin-top:.9rem}

  .resumen-carta{display:flex;gap:2rem;justify-content:center;margin-bottom:1.2rem;flex-wrap:wrap}
  .resumen-carta div{text-align:center}
  .resumen-carta strong{display:block;color:var(--oro-claro);font-family:var(--serif);font-size:1.25rem;font-weight:600}
  .resumen-carta span{font-size:.66rem;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.1em}

  .compat-par{display:flex;gap:1rem;margin-bottom:1.1rem}
  .compat-persona{flex:1;text-align:center;padding:1rem;border:1px solid var(--linea);border-radius:6px}
  .compat-persona h4{font-family:var(--serif);color:var(--marfil);font-size:.95rem;margin-bottom:.5rem;font-weight:600}
  .compat-persona .signo-mini{font-size:.7rem;color:var(--texto-suave);margin-top:.2rem}
  .compat-persona .signo-mini strong{color:var(--oro-claro);font-weight:600}

  .divisor{
    display:flex;align-items:center;gap:.7rem;color:var(--oro);font-size:.7rem;
    margin:1.6rem 0 1.2rem;letter-spacing:.15em;text-transform:uppercase;
  }
  .divisor::before,.divisor::after{content:"";flex:1;height:1px;background:var(--linea)}
</style>
</head>
<body>

<header class="top">
  <div class="logo">Oráculo <span>Astral</span></div>
  <button class="link-sutil oculto" id="btn-cambiar-cuenta" onclick="cerrarSesion()">Cambiar de cuenta</button>
</header>

<div id="pantalla-onboarding" class="wrap">
  <div class="centro" style="margin:1rem 0 1.8rem">
    <span class="eyebrow">Bienvenida</span>
    <h1 style="font-size:2rem;margin-top:.5rem">Tu cielo, cada mañana</h1>
    <p style="color:var(--texto-suave);margin-top:.6rem;font-size:.9rem">
      Ingresa tus datos de nacimiento una sola vez — a partir de ahí, tu guía diaria te espera.
    </p>
  </div>

  <div class="card">
    <label>Tu correo</label>
    <input type="email" id="ob-correo" placeholder="tú@correo.com" autocomplete="email">

    <label>Fecha de nacimiento</label>
    <input type="date" id="ob-fecha">

    <label>Hora de nacimiento</label>
    <input type="time" id="ob-hora">

    <label>Ciudad de nacimiento</label>
    <input type="text" id="ob-ciudad" list="lista-ciudades" placeholder="Ej: Medellín">
    <datalist id="lista-ciudades"></datalist>

    <div id="ob-error" class="error-msg oculto"></div>
    <button class="btn btn-oro" onclick="iniciarSesion()">Ver mi guía de hoy</button>
    <p style="font-size:.72rem;color:var(--texto-suave);text-align:center;margin-top:.9rem">
      Al continuar, aceptas nuestra
      <a href="privacidad.html" style="color:var(--oro-claro)">Política de Privacidad</a>
      y
      <a href="terminos.html" style="color:var(--oro-claro)">Términos de Servicio</a>.
    </p>
  </div>
</div>

<div id="pantalla-app" class="wrap oculto">
  <nav class="tabs">
    <button class="tab-btn activo" data-tab="hoy" onclick="cambiarTab('hoy')">Hoy</button>
    <button class="tab-btn" data-tab="suenos" onclick="cambiarTab('suenos')">Sueños</button>
    <button class="tab-btn" data-tab="compat" onclick="cambiarTab('compat')">Compatibilidad</button>
    <button class="tab-btn" data-tab="historial" onclick="cambiarTab('historial')">Historial</button>
    <button class="tab-btn" data-tab="premium" onclick="cambiarTab('premium')">Premium</button>
  </nav>

  <section id="tab-hoy">
    <div id="hoy-contenido" class="estado-msg">Consultando los astros…</div>
  </section>

  <section id="tab-suenos" class="oculto">
    <div class="card">
      <label>Describe tu sueño</label>
      <textarea id="sueno-texto" rows="4" placeholder="Soñé que..."></textarea>
      <button class="btn btn-oro" onclick="interpretarSueno()">Interpretar sueño</button>
    </div>
    <div id="sueno-resultado"></div>
  </section>

  <section id="tab-compat" class="oculto">
    <div class="card">
      <label>Nombre de la otra persona</label>
      <input type="text" id="compat-nombre" placeholder="Ej: Luis">
      <label>Su fecha de nacimiento</label>
      <input type="date" id="compat-fecha">
      <label>Su hora de nacimiento</label>
      <input type="time" id="compat-hora">
      <label>Su ciudad de nacimiento</label>
      <input type="text" id="compat-ciudad" placeholder="Ej: Bogotá">
      <button class="btn btn-oro" onclick="compararCompatibilidad()">Comparar cartas</button>
    </div>
    <div id="compat-resultado"></div>
  </section>

  <section id="tab-historial" class="oculto">
    <div id="historial-contenido" class="estado-msg">Cargando historial…</div>
  </section>

  <section id="tab-premium" class="oculto">
    <div id="premium-contenido" class="estado-msg">Consultando tu suscripción…</div>
  </section>
</div>

<script>
const API = "https://oraculo-astral-api.onrender.com";

function guardarSesion(usuarioId, token, datosNacimiento) {
  localStorage.setItem("oa_usuario_id", usuarioId);
  localStorage.setItem("oa_token", token);
  localStorage.setItem("oa_nacimiento", JSON.stringify(datosNacimiento));
}
function obtenerSesion() {
  const usuarioId = localStorage.getItem("oa_usuario_id");
  const token = localStorage.getItem("oa_token");
  const nacimiento = JSON.parse(localStorage.getItem("oa_nacimiento") || "null");
  return usuarioId && token && nacimiento ? { usuarioId, token, nacimiento } : null;
}
function cerrarSesion() {
  if (!confirm("¿Cambiar de cuenta? Vas a tener que ingresar tus datos de nuevo.")) return;
  localStorage.removeItem("oa_usuario_id");
  localStorage.removeItem("oa_token");
  localStorage.removeItem("oa_nacimiento");
  document.getElementById("pantalla-app").classList.add("oculto");
  document.getElementById("pantalla-onboarding").classList.remove("oculto");
  document.getElementById("btn-cambiar-cuenta").classList.add("oculto");
}

async function llamarAPI(ruta, opciones) {
  opciones = opciones || {};
  const sesion = obtenerSesion();
  const headers = Object.assign({ "Content-Type": "application/json" }, opciones.headers || {});
  if (sesion) headers["X-Access-Token"] = sesion.token;

  const respuesta = await fetch(API + ruta, Object.assign({}, opciones, { headers: headers }));
  if (!respuesta.ok) {
    let detalle = "Ocurrió un error.";
    try { detalle = (await respuesta.json()).detail || detalle; } catch (e) {}
    const error = new Error(detalle);
    error.status = respuesta.status;
    throw error;
  }
  return respuesta;
}

async function cargarCiudades() {
  try {
    const r = await fetch(API + "/carta-natal/ciudades");
    const datos = await r.json();
    const lista = document.getElementById("lista-ciudades");
    datos.ciudades.forEach(function(c) {
      const opt = document.createElement("option");
      opt.value = c.split(",")[0];
      lista.appendChild(opt);
    });
  } catch (e) {}
}
cargarCiudades();

async function iniciarSesion() {
  const correo = document.getElementById("ob-correo").value.trim();
  const fecha = document.getElementById("ob-fecha").value;
  const hora = document.getElementById("ob-hora").value;
  const ciudad = document.getElementById("ob-ciudad").value.trim();
  const errorEl = document.getElementById("ob-error");
  errorEl.classList.add("oculto");

  if (!correo || !fecha || !hora || !ciudad) {
    errorEl.textContent = "Completa todos los campos para continuar.";
    errorEl.classList.remove("oculto");
    return;
  }

  try {
    const r = await fetch(API + "/auth/generar-token", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario_id: correo }),
    });
    if (!r.ok) throw new Error("No se pudo crear tu sesión.");
    const datos = await r.json();

    guardarSesion(correo, datos.token, { fecha: fecha, hora: hora, ciudad: ciudad });

    document.getElementById("pantalla-onboarding").classList.add("oculto");
    document.getElementById("pantalla-app").classList.remove("oculto");
    document.getElementById("btn-cambiar-cuenta").classList.remove("oculto");
    cambiarTab("hoy");
  } catch (e) {
    errorEl.textContent = e.message || "Algo salió mal. Intenta de nuevo.";
    errorEl.classList.remove("oculto");
  }
}

function cambiarTab(nombre) {
  document.querySelectorAll(".tab-btn").forEach(function(b) {
    b.classList.toggle("activo", b.dataset.tab === nombre);
  });
  ["hoy", "suenos", "compat", "historial", "premium"].forEach(function(t) {
    document.getElementById("tab-" + t).classList.toggle("oculto", t !== nombre);
  });
  if (nombre === "hoy") cargarLecturaHoy();
  if (nombre === "historial") cargarHistorial();
  if (nombre === "premium") cargarPremium();
}

async function cargarLecturaHoy() {
  const sesion = obtenerSesion();
  const cont = document.getElementById("hoy-contenido");
  cont.className = "estado-msg";
  cont.textContent = "Consultando los astros…";

  try {
    const r = await llamarAPI("/lectura/diaria", {
      method: "POST",
      body: JSON.stringify({
        usuario_id: sesion.usuarioId,
        fecha: sesion.nacimiento.fecha,
        hora: sesion.nacimiento.hora,
        ciudad: sesion.nacimiento.ciudad,
      }),
    });
    const d = await r.json();

    cont.className = "";
    cont.innerHTML =
      '<div class="resumen-carta">' +
        '<div><strong>' + d.carta_natal_resumen.sol.signo + '</strong><span>Sol</span></div>' +
        '<div><strong>' + d.carta_natal_resumen.luna.signo + '</strong><span>Luna</span></div>' +
        '<div><strong>' + d.carta_natal_resumen.ascendente.signo + '</strong><span>Ascendente</span></div>' +
      '</div>' +
      '<div class="fila centro" style="justify-content:center;margin-bottom:1.2rem">' +
        '<span class="chip">Tarot · ' + d.tarot.carta + ' (' + d.tarot.orientacion + ')</span>' +
        '<span class="chip">Camino de vida · ' + d.numerologia.numero + '</span>' +
      '</div>' +
      '<div class="card"><p>' + d.lectura + '</p></div>' +
      '<button class="btn btn-ghost" id="btn-escuchar" onclick="escucharLecturaHoy()">Escuchar en audio</button>' +
      '<div id="audio-hoy"></div>';
  } catch (e) {
    cont.className = "error-msg";
    cont.textContent = e.message;
  }
}

async function escucharLecturaHoy() {
  const sesion = obtenerSesion();
  const btn = document.getElementById("btn-escuchar");
  const cont = document.getElementById("audio-hoy");
  btn.textContent = "Generando audio…";
  btn.disabled = true;

  try {
    const r = await llamarAPI("/audio/lectura-diaria-narrada", {
      method: "POST",
      body: JSON.stringify({
        usuario_id: sesion.usuarioId,
        fecha: sesion.nacimiento.fecha,
        hora: sesion.nacimiento.hora,
        ciudad: sesion.nacimiento.ciudad,
      }),
    });
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    cont.innerHTML = '<audio controls autoplay src="' + url + '"></audio>';
    btn.classList.add("oculto");
  } catch (e) {
    if (e.status === 402) {
      cont.innerHTML = '<div class="error-msg">El audio es una función premium. Ve a la pestaña "Premium" para activarlo.</div>';
    } else {
      cont.innerHTML = '<div class="error-msg">' + e.message + '</div>';
    }
    btn.textContent = "Escuchar en audio";
    btn.disabled = false;
  }
}

async function interpretarSueno() {
  const texto = document.getElementById("sueno-texto").value.trim();
  const cont = document.getElementById("sueno-resultado");
  if (!texto) return;

  cont.className = "estado-msg";
  cont.textContent = "Interpretando tu sueño…";

  try {
    const r = await fetch(API + "/suenos/interpretar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ descripcion: texto }),
    });
    const d = await r.json();
    cont.className = "";
    cont.innerHTML = '<div class="card"><p>' + d.interpretacion + '</p></div>';
  } catch (e) {
    cont.className = "error-msg";
    cont.textContent = "No se pudo interpretar el sueño. Intenta de nuevo.";
  }
}

async function compararCompatibilidad() {
  const sesion = obtenerSesion();
  const cont = document.getElementById("compat-resultado");
  const nombreB = document.getElementById("compat-nombre").value.trim();
  const fechaB = document.getElementById("compat-fecha").value;
  const horaB = document.getElementById("compat-hora").value;
  const ciudadB = document.getElementById("compat-ciudad").value.trim();

  if (!nombreB || !fechaB || !horaB || !ciudadB) {
    cont.innerHTML = '<div class="error-msg">Completa todos los datos de la otra persona.</div>';
    return;
  }

  cont.className = "estado-msg";
  cont.textContent = "Comparando cartas…";

  try {
    const r = await llamarAPI("/compatibilidad/comparar", {
      method: "POST",
      body: JSON.stringify({
        usuario_id: sesion.usuarioId,
        persona_a: { nombre: "Tú", fecha: sesion.nacimiento.fecha, hora: sesion.nacimiento.hora, ciudad: sesion.nacimiento.ciudad },
        persona_b: { nombre: nombreB, fecha: fechaB, hora: horaB, ciudad: ciudadB },
      }),
    });
    const d = await r.json();
    cont.className = "";
    cont.innerHTML =
      '<div class="compat-par">' +
        '<div class="compat-persona"><h4>' + d.persona_a.nombre + '</h4>' +
          '<div class="signo-mini">Sol <strong>' + d.persona_a.sol + '</strong></div>' +
          '<div class="signo-mini">Luna <strong>' + d.persona_a.luna + '</strong></div>' +
          '<div class="signo-mini">Ascendente <strong>' + d.persona_a.ascendente + '</strong></div>' +
        '</div>' +
        '<div class="compat-persona"><h4>' + d.persona_b.nombre + '</h4>' +
          '<div class="signo-mini">Sol <strong>' + d.persona_b.sol + '</strong></div>' +
          '<div class="signo-mini">Luna <strong>' + d.persona_b.luna + '</strong></div>' +
          '<div class="signo-mini">Ascendente <strong>' + d.persona_b.ascendente + '</strong></div>' +
        '</div>' +
      '</div>' +
      '<div class="card"><p>' + d.lectura + '</p></div>';
  } catch (e) {
    cont.className = "";
    if (e.status === 402) {
      cont.innerHTML = '<div class="error-msg">Comparar compatibilidad es una función premium. Ve a la pestaña "Premium" para activarlo.</div>';
    } else {
      cont.innerHTML = '<div class="error-msg">' + e.message + '</div>';
    }
  }
}

async function cargarHistorial() {
  const sesion = obtenerSesion();
  const cont = document.getElementById("historial-contenido");
  cont.className = "estado-msg";
  cont.textContent = "Cargando historial…";

  try {
    const rHist = await llamarAPI("/historial/" + encodeURIComponent(sesion.usuarioId));
    const rPat = await llamarAPI("/historial/" + encodeURIComponent(sesion.usuarioId) + "/patrones");
    const hist = await rHist.json();
    const pat = await rPat.json();

    let patronesHtml = "";
    if (pat.total_lecturas > 0) {
      patronesHtml =
        '<div class="card"><h3 style="font-size:1rem;margin-bottom:.7rem">Tus patrones</h3>' +
        '<div class="fila">' +
          '<span class="chip">' + pat.total_lecturas + ' lecturas</span>' +
          '<span class="chip">Camino de vida · ' + pat.numerologia_numero + '</span>' +
          '<span class="chip">Frecuente · ' + pat.carta_mas_frecuente + '</span>' +
        '</div></div><div class="divisor">Lecturas pasadas</div>';
    }

    const lecturasHtml = hist.lecturas.map(function(l) {
      const fecha = new Date(l.fecha_lectura).toLocaleDateString("es-CO", { day: "numeric", month: "long" });
      return '<div class="card">' +
        '<div class="fila" style="margin-bottom:.6rem">' +
          '<span class="chip">' + fecha + '</span>' +
          '<span class="chip">' + l.tarot_carta + ' (' + l.tarot_orientacion + ')</span>' +
        '</div>' +
        '<p>' + l.lectura_texto.slice(0, 200) + '…</p></div>';
    }).join("");

    cont.className = "";
    cont.innerHTML = patronesHtml + (lecturasHtml || '<p class="estado-msg">Todavía no tienes lecturas guardadas.</p>');
  } catch (e) {
    cont.className = "error-msg";
    cont.textContent = e.message;
  }
}

async function cargarPremium() {
  const sesion = obtenerSesion();
  const cont = document.getElementById("premium-contenido");
  cont.className = "estado-msg";
  cont.textContent = "Consultando tu suscripción…";

  try {
    const r = await llamarAPI("/pagos/estado/" + encodeURIComponent(sesion.usuarioId));
    const d = await r.json();

    if (d.plan === "premium" && d.estado === "activa") {
      const vence = new Date(d.fecha_fin).toLocaleDateString("es-CO", { day: "numeric", month: "long" });
      cont.className = "";
      cont.innerHTML =
        '<div class="premium-banner"><span class="eyebrow">Tu plan</span>' +
        '<div class="precio">Premium activo</div>' +
        '<p style="font-size:.85rem;color:var(--texto-suave)">Vence el ' + vence + '</p></div>';
    } else {
      cont.className = "";
      cont.innerHTML =
        '<div class="premium-banner"><span class="eyebrow">Desbloquea todo</span>' +
        '<div class="precio">Premium</div>' +
        '<p style="font-size:.85rem;color:var(--texto-suave);margin-bottom:1.2rem">Audio narrado + compatibilidad con otras personas</p>' +
        '<button class="btn btn-oro" onclick="pagarPremium()">Activar con Wompi</button></div>';
    }
  } catch (e) {
    cont.className = "error-msg";
    cont.textContent = e.message;
  }
}

async function pagarPremium() {
  const sesion = obtenerSesion();
  try {
    const r = await llamarAPI("/pagos/wompi/crear-link", {
      method: "POST",
      body: JSON.stringify({
        usuario_id: sesion.usuarioId,
        url_redireccion: window.location.href,
      }),
    });
    const d = await r.json();
    window.location.href = d.url_pago;
  } catch (e) {
    alert("No se pudo generar el link de pago: " + e.message);
  }
}

(function iniciar() {
  const sesion = obtenerSesion();
  if (sesion) {
    document.getElementById("pantalla-onboarding").classList.add("oculto");
    document.getElementById("pantalla-app").classList.remove("oculto");
    document.getElementById("btn-cambiar-cuenta").classList.remove("oculto");
    cambiarTab("hoy");
  }
})();
</script>
